<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Corner radius" subtitle="4 → pill, 24px main pane" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);font-family:var(--font-sans);}
  .card{padding:26px 30px;box-sizing:border-box;display:flex;gap:22px;align-items:flex-end;flex-wrap:wrap;}
  .item{text-align:center;}
  .box{width:74px;height:74px;background:var(--blue-100);border:1.5px solid var(--blue-main);}
  .lbl{font-size:12px;color:var(--gray-700);margin-top:8px;font-weight:600;}
  .sub{font-size:11px;color:var(--gray-500);}
</style>
</head>
<body>
<div class="card">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">xs · 4</div></div>
  <div class="item"><div class="box" style="border-radius:5px"></div><div class="lbl">sm · 5</div><div class="sub">btn group</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">md · 8</div><div class="sub">button/input</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">lg · 12</div><div class="sub">card</div></div>
  <div class="item"><div class="box" style="border-radius:24px 0 0 0"></div><div class="lbl">2xl · 24</div><div class="sub">main pane</div></div>
  <div class="item"><div class="box" style="border-radius:100px"></div><div class="lbl">pill · 100</div><div class="sub">badge/icon</div></div>
</div>
</body>
</html>
