<!DOCTYPE html>
<!-- @dsCard group="Components" name="Badges & chips" subtitle="Info, return, status pills" viewport="700x120" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
<style>
  html,body{margin:0;background:var(--white);font-family:var(--font-sans);}
  .card{padding:26px 30px;box-sizing:border-box;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;padding:4px 12px;border-radius:100px;line-height:1.3;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
</style>
</head>
<body>
<div class="card">
  <span class="badge" style="background:var(--blue-100);color:var(--blue-main)"><i class='bx bx-info-circle'></i>Rapporteringsdato: 02.06.2024</span>
  <span class="badge" style="background:var(--success-bg);color:var(--success-700)"><span class="dot" style="background:var(--success-600)"></span>+26,12 %</span>
  <span class="badge" style="background:var(--error-bg);color:var(--error-700)"><span class="dot" style="background:var(--error-600)"></span>−14,51 %</span>
  <span class="badge" style="background:var(--gray-100);color:var(--gray-700)">Nøytral</span>
  <span class="badge" style="background:var(--warning-bg);color:var(--warning-700)"><span class="dot" style="background:var(--warning-600)"></span>Til vurdering</span>
  <span class="badge" style="background:var(--secondary-100);color:var(--secondary-800)">Aksjefond</span>
</div>
</body>
</html>
