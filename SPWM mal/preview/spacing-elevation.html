<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation / shadows" subtitle="Soft xs → xl shadows" viewport="700x190" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);font-family:var(--font-sans);}
  .card{padding:30px;box-sizing:border-box;display:flex;gap:26px;align-items:center;flex-wrap:wrap;background:var(--gray-25);}
  .item{text-align:center;}
  .box{width:84px;height:84px;background:#fff;border-radius:12px;}
  .lbl{font-size:12px;color:var(--gray-700);margin-top:12px;font-weight:600;}
</style>
</head>
<body>
<div class="card">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lbl">shadow-xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">shadow-sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lbl">shadow-md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">shadow-lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lbl">shadow-xl</div></div>
</div>
</body>
</html>
