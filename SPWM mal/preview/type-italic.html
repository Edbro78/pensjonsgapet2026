<!DOCTYPE html>
<!-- @dsCard group="Type" name="SoderbergSans italic" subtitle="Client-supplied editorial italic family" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);font-family:var(--font-sans);color:var(--sp-navy);}
  .card{padding:28px 32px;box-sizing:border-box;}
  .big{font-family:var(--font-italic);font-style:italic;font-weight:500;font-size:52px;line-height:1.05;color:var(--sp-navy);}
  .meta{margin-top:14px;font-size:14px;color:var(--gray-500);}
  .weights{display:flex;gap:26px;margin-top:14px;font-family:var(--font-italic);font-style:italic;font-size:22px;color:var(--sp-navy);flex-wrap:wrap;}
</style>
</head>
<body>
<div class="card">
  <div class="big">Forvaltning &amp; rådgivning</div>
  <div class="weights">
    <span style="font-weight:300">Light</span>
    <span style="font-weight:400">Regular</span>
    <span style="font-weight:500">Medium</span>
    <span style="font-weight:700">Bold</span>
    <span style="font-weight:900">Black</span>
  </div>
  <div class="meta">SoderbergSans — client-supplied italic display family (italics only). Use for editorial accents.</div>
</div>
</body>
</html>
