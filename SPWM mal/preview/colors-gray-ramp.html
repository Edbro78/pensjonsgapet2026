<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Neutral / Gray ramp" subtitle="Gray 25 → 900" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);font-family:var(--font-sans);}
  .card{padding:24px 28px;box-sizing:border-box;}
  .title{font-size:13px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;}
  .ramp{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--gray-200);}
  .cell{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 6px;box-sizing:border-box;}
  .n{font-size:12px;font-weight:600;}
  .h{font-size:9.5px;opacity:.8;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="card">
  <div class="title">Neutral · Gray</div>
  <div class="ramp">
    <div class="cell" style="background:#FCFCFD;color:#475467"><div class="n">25</div><div class="h">FCFCFD</div></div>
    <div class="cell" style="background:#F9FAFB;color:#475467"><div class="n">50</div><div class="h">F9FAFB</div></div>
    <div class="cell" style="background:#F2F4F7;color:#475467"><div class="n">100</div><div class="h">F2F4F7</div></div>
    <div class="cell" style="background:#EAECF0;color:#475467"><div class="n">200</div><div class="h">EAECF0</div></div>
    <div class="cell" style="background:#D0D5DD;color:#344054"><div class="n">300</div><div class="h">D0D5DD</div></div>
    <div class="cell" style="background:#98A2B3;color:#fff"><div class="n">400</div><div class="h">98A2B3</div></div>
    <div class="cell" style="background:#667085;color:#fff"><div class="n">500</div><div class="h">667085</div></div>
    <div class="cell" style="background:#475467;color:#fff"><div class="n">600</div><div class="h">475467</div></div>
    <div class="cell" style="background:#344054;color:#fff"><div class="n">700</div><div class="h">344054</div></div>
    <div class="cell" style="background:#101828;color:#fff"><div class="n">900</div><div class="h">101828</div></div>
  </div>
</div>
</body>
</html>
