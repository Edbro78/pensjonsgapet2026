<!DOCTYPE html>
<!-- @dsCard group="Type" name="Display scale" subtitle="Display xs → xl, −2% tracking" viewport="700x300" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);font-family:var(--font-sans);color:var(--sp-navy);}
  .card{padding:26px 32px;box-sizing:border-box;}
  .row{display:flex;align-items:baseline;justify-content:space-between;gap:24px;padding:9px 0;border-bottom:1px solid var(--gray-100);}
  .row:last-child{border-bottom:0;}
  .sample{font-family:var(--font-display);color:var(--sp-navy);white-space:nowrap;}
  .spec{font-size:12px;color:var(--gray-500);white-space:nowrap;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="sample" style="font-size:60px;line-height:1;letter-spacing:-.02em;font-weight:600">Display xl</span><span class="spec">60 / 72 · −2% · Semibold</span></div>
  <div class="row"><span class="sample" style="font-size:48px;line-height:1;letter-spacing:-.02em;font-weight:500">Display lg</span><span class="spec">48 / 60 · −2% · Medium</span></div>
  <div class="row"><span class="sample" style="font-size:36px;line-height:1;letter-spacing:-.02em;font-weight:500">Display md</span><span class="spec">36 / 44 · −2% · Medium</span></div>
  <div class="row"><span class="sample" style="font-size:30px;line-height:1;font-weight:500">Display sm</span><span class="spec">30 / 38 · Medium</span></div>
  <div class="row"><span class="sample" style="font-size:24px;line-height:1;font-weight:500">Display xs</span><span class="spec">24 / 32 · Medium</span></div>
</div>
</body>
</html>
