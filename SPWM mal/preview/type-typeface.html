<!DOCTYPE html>
<!-- @dsCard group="Type" name="Typeface — Whitney" subtitle="Product face (Hanken Grotesk substitute), 4 weights" viewport="700x270" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);font-family:var(--font-sans);color:var(--sp-navy);}
  .card{padding:28px 32px;box-sizing:border-box;}
  .specimen{font-family:var(--font-display);font-weight:var(--fw-semibold);font-size:108px;line-height:1;letter-spacing:-0.02em;color:var(--sp-navy);}
  .meta{display:flex;gap:28px;align-items:baseline;margin-top:10px;}
  .meta .name{font-size:20px;font-weight:var(--fw-medium);}
  .meta .sub{font-size:14px;color:var(--gray-500);}
  .glyphs{margin-top:14px;font-size:15px;color:var(--gray-600);letter-spacing:0.01em;}
  .weights{display:flex;gap:24px;margin-top:8px;font-size:22px;}
  .weights span{color:var(--sp-navy);}
</style>
</head>
<body>
<div class="card">
  <div class="specimen">Ag</div>
  <div class="meta">
    <div class="name">Whitney</div>
    <div class="sub">Product typeface · substituted by Hanken Grotesk</div>
  </div>
  <div class="weights">
    <span style="font-weight:400">Book</span>
    <span style="font-weight:500">Medium</span>
    <span style="font-weight:600">Semibold</span>
    <span style="font-weight:700">Bold</span>
  </div>
  <div class="glyphs">ABCDEFGHIJKLMNOPQRSTUVWXYZ&nbsp; abcdefghijklmnopqrstuvwxyz&nbsp; 0123456789&nbsp; kr&nbsp;%&nbsp;+−</div>
</div>
</body>
</html>
