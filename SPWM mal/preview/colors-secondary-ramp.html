<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Secondary ramp" subtitle="Navy-gray 25 → 800" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);font-family:var(--font-sans);}
  .card{padding:24px 28px;box-sizing:border-box;}
  .title{font-size:13px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;}
  .ramp{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--gray-200);}
  .cell{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 6px;box-sizing:border-box;}
  .n{font-size:12px;font-weight:600;}
  .h{font-size:9.5px;opacity:.8;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="card">
  <div class="title">Secondary · Navy-gray</div>
  <div class="ramp">
    <div class="cell" style="background:#F6F7F9;color:#475467"><div class="n">25</div><div class="h">F6F7F9</div></div>
    <div class="cell" style="background:#ECEFF3;color:#475467"><div class="n">100</div><div class="h">ECEFF3</div></div>
    <div class="cell" style="background:#E5E9EE;color:#475467"><div class="n">200</div><div class="h">E5E9EE</div></div>
    <div class="cell" style="background:#CCD3DE;color:#264472"><div class="n">300</div><div class="h">CCD3DE</div></div>
    <div class="cell" style="background:#A0AEC4;color:#fff"><div class="n">400</div><div class="h">A0AEC4</div></div>
    <div class="cell" style="background:#8091AC;color:#fff"><div class="n">500</div><div class="h">8091AC</div></div>
    <div class="cell" style="background:#597093;color:#fff"><div class="n">600</div><div class="h">597093</div></div>
    <div class="cell" style="background:#405A82;color:#fff"><div class="n">700</div><div class="h">405A82</div></div>
    <div class="cell" style="background:#264472;color:#fff"><div class="n">800</div><div class="h">264472</div></div>
  </div>
</div>
</body>
</html>
