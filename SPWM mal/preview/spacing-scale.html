<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4px base grid" viewport="700x300" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--white);font-family:var(--font-sans);}
  .card{padding:26px 30px;box-sizing:border-box;}
  .title{font-size:13px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;}
  .rows{display:flex;flex-direction:column;gap:10px;}
  .r{display:flex;align-items:center;gap:14px;}
  .bar{height:14px;background:var(--blue-main);border-radius:3px;}
  .t{font-size:13px;color:var(--gray-700);width:120px;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="card">
  <div class="title">Spacing · 4px base grid</div>
  <div class="rows">
    <div class="r"><span class="t">space-1 · 4</span><span class="bar" style="width:4px"></span></div>
    <div class="r"><span class="t">space-2 · 8</span><span class="bar" style="width:8px"></span></div>
    <div class="r"><span class="t">space-3 · 12</span><span class="bar" style="width:12px"></span></div>
    <div class="r"><span class="t">space-4 · 16</span><span class="bar" style="width:16px"></span></div>
    <div class="r"><span class="t">space-6 · 24</span><span class="bar" style="width:24px"></span></div>
    <div class="r"><span class="t">space-8 · 32</span><span class="bar" style="width:32px"></span></div>
    <div class="r"><span class="t">space-10 · 40</span><span class="bar" style="width:40px"></span></div>
    <div class="r"><span class="t">space-16 · 64</span><span class="bar" style="width:64px"></span></div>
  </div>
</div>
</body>
</html>
